# =========================================================================
# Quarkus HTTP Server Configurations
# =========================================================================
# The port the REST API listens on
quarkus.http.port=${HTTP_PORT:8080}

# =========================================================================
# Logging Configurations
# =========================================================================
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}
quarkus.log.category."com.manipal".level=DEBUG

# =========================================================================
# HL7 MLLP (TCP Netty) Configurations
# =========================================================================
# The port the HL7 MLLP server listens on
hl7.mllp.port=${HL7_MLLP_PORT:2575}
# Flag to enable/disable MLLP receiver
hl7.mllp.enabled=${HL7_MLLP_ENABLED:true}

# =========================================================================
# Apache Camel Kafka Configurations
# =========================================================================
# Kafka broker addresses
kafka.brokers=${KAFKA_BROKERS:localhost:9092}
# Target Kafka topic for receiving HL7 messages
kafka.topic=${KAFKA_TOPIC:hl7-messages}
# Concurrent consumer threads processing the SEDA queue to send to Kafka
kafka.concurrent.consumers=${KAFKA_CONCURRENT_CONSUMERS:5}

# =========================================================================
# GraalVM Native Build Configuration
# =========================================================================
# Register reflection metadata for any native serialization if required.
# Camel-quarkus-hl7 and netty extensions handle this automatically.
quarkus.native.resources.includes=**/*.properties
